# Profile for local/async integration with ActiveMQ + IAM publisher.
# Run Organization with: --spring.profiles.active=messaging,dev
# Requires broker at ACTIVEMQ_BROKER_URL and IAM reachable for user lookups (REST).

app.messaging.enabled=true
app.iam.adapter=jms

spring.activemq.broker-url=${ACTIVEMQ_BROKER_URL:tcp://localhost:61616}
spring.activemq.user=${ACTIVEMQ_USER:meditrack}
spring.activemq.password=${ACTIVEMQ_PASSWORD:meditrack}

app.iam.base-url=${IAM_BASE_URL:http://localhost:8080}
