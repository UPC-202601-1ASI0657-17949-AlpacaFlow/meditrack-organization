# src/main/resources/application-prod.properties
# This profile is activated for production deployments
# Spring Application Name
spring.application.name=organization

# Spring DataSource Configuration
spring.datasource.url=${MYSQL_CONNECTION}
spring.datasource.username=${MYSQL_USER}
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Spring JPA Configuration
spring.jpa.show-sql=true

# Spring Data JPA Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.naming.physical-strategy=com.alpacaflow.meditrack.organization.shared.infrastructure.persistence.jpa.configuration.strategy.SnakeCaseWithPluralizedTablePhysicalNamingStrategy

# Application Information for Documentation
documentation.application.description=@project.description@
documentation.application.version=@project.version@
documentation.public-base-url=${PUBLIC_BASE_URL:}

# Behind Caddy/reverse proxy: use X-Forwarded-Proto so Swagger uses https://
server.forward-headers-strategy=framework

# CORS (include your public HTTPS domain for Swagger/frontend)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://meditrack-organization.duckdns.org,http://localhost:4200}

# JWT Configuration (override in Docker via AUTHORIZATION_JWT_SECRET)
authorization.jwt.secret=${AUTHORIZATION_JWT_SECRET:WriteHereYourSecretStringForTokenSigningCredentials}
authorization.jwt.expiration.days=7

# ACL adapters: use "rest" in production so doctors/caregivers are provisioned in IAM.
app.iam.adapter=${IAM_ADAPTER:rest}
app.iam.base-url=${IAM_BASE_URL:https://meditrack-iam-gmh0b2eshgcpbmhw.eastus-01.azurewebsites.net}
app.devices.adapter=${DEVICES_ADAPTER:stub}
