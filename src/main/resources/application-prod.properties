server.port=${SERVER_PORT:8081}

# Database
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.naming.physical-strategy=com.alpacafkow.meditrack.organization.shared.infrastructure.persistence.jpa.configuration.strategy.SnakeCaseWithPluralizedTablePhysicalNamingStrategy

# Flyway (enable when SQL migrations are added; use validate ddl with baseline)
spring.flyway.enabled=false

# Security and integrations
authorization.jwt.secret=${JWT_SECRET}
authorization.jwt.public-key=${JWT_PUBLIC_KEY:}
integration.iam.base-url=${IAM_BASE_URL}
integration.devices.base-url=${DEVICES_BASE_URL}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# ACL adapters: switch to "rest" once the IAM/Devices microservices are available.
app.iam.adapter=${IAM_ADAPTER:stub}
app.devices.adapter=${DEVICES_ADAPTER:stub}
