server.port=${SERVER_PORT:8081}

# Database
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/organization?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.naming.physical-strategy=com.alpacaflow.meditrack.organization.shared.infrastructure.persistence.jpa.configuration.strategy.SnakeCaseWithPluralizedTablePhysicalNamingStrategy

# Flyway (optional; disabled for V1 sprint — schema managed by Hibernate in dev)
spring.flyway.enabled=false

# UnauthorizedRequestHandlerEntryPoint queda registrado para cuando se protejan rutas (JWT).
authorization.jwt.secret=${JWT_SECRET:change-me-dev-secret}
authorization.jwt.public-key=${JWT_PUBLIC_KEY:}
integration.iam.base-url=${IAM_BASE_URL:http://localhost:8080}
integration.devices.base-url=${DEVICES_BASE_URL:http://localhost:8082}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}

# ACL adapters: switch to "rest" once the IAM/Devices microservices are available.
app.iam.adapter=${IAM_ADAPTER:stub}
app.devices.adapter=${DEVICES_ADAPTER:stub}
