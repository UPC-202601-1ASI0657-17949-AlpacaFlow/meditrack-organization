name: Deploy to Oracle VM

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy over SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          set -e
          DEPLOY_USER="$(printf '%s' "$DEPLOY_USER" | tr -d '[:space:]')"
          DEPLOY_HOST="$(printf '%s' "$DEPLOY_HOST" | tr -d '[:space:]')"
          if [ -z "$DEPLOY_USER" ] || [ -z "$DEPLOY_HOST" ]; then
            echo "DEPLOY_USER and DEPLOY_HOST must be set in repository secrets"
            exit 1
          fi
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          SSH_OPTS="-i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o IdentitiesOnly=yes"

          ssh $SSH_OPTS "${DEPLOY_USER}@${DEPLOY_HOST}" \
            'mkdir -p ~/meditrack-organization'

          # Sync from runner (authenticated checkout) — avoids git HTTPS auth on the VM
          rsync -az --delete \
            --exclude '.git' \
            --exclude '.env' \
            --exclude 'mysql_data' \
            -e "ssh $SSH_OPTS" \
            ./ "${DEPLOY_USER}@${DEPLOY_HOST}:~/meditrack-organization/"

          ssh $SSH_OPTS "${DEPLOY_USER}@${DEPLOY_HOST}" \
            'set -e
             docker network create meditrack-net 2>/dev/null || true
             if [ -d ~/meditrack-broker/.git ] && [ -f ~/meditrack-broker/.env ]; then
               cd ~/meditrack-broker
               git fetch origin || echo "Warning: broker git fetch failed (check VM git credentials)"
               git reset --hard origin/main || true
               docker compose pull
               docker compose up -d
             fi
             if [ ! -f ~/meditrack-organization/.env ]; then
               echo ".env missing on VM. Copy .env.example to .env and configure it once on the server."
               exit 1
             fi
             cd ~/meditrack-organization
             docker compose down
             docker compose up -d --build
             docker compose ps'
